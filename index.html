<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1769aa">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="data:,">
  <title>日志分析助手 Mobile</title>
  <script src="plotly.min.js"></script>
  <style>
    :root {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --text: #162033;
      --muted: #667085;
      --line: #d9dee8;
      --primary: #1769aa;
      --primary-dark: #0e4f82;
      --ok: #147d52;
      --danger: #b42318;
      --shadow: 0 10px 24px rgba(22, 32, 51, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 3;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .wrap { width: min(1120px, 100%); margin: 0 auto; padding: 14px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    h1 { margin: 0; font-size: 20px; letter-spacing: 0; }
    .badge { color: var(--muted); font-size: 13px; text-align: right; }
    main { padding: 14px 0 42px; }
    .layout { display: grid; grid-template-columns: 360px 1fr; gap: 14px; align-items: start; }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .panel { padding: 14px; }
    h2 { margin: 0 0 12px; font-size: 17px; letter-spacing: 0; }
    label { display: block; color: var(--muted); font-size: 14px; margin: 12px 0 8px; }
    input[type="file"] {
      width: 100%;
      border: 1px dashed #a7b0c0;
      background: #fbfcfe;
      padding: 18px;
      border-radius: 8px;
      font-size: 15px;
    }
    .check {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-top: 1px solid #edf0f5;
      color: var(--text);
      font-size: 15px;
    }
    .check input { width: 20px; height: 20px; margin-top: 1px; }
    .actions { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 14px; }
    button, .download-link {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
    }
    button.secondary, .download-link.secondary { background: #eef6fc; color: var(--primary-dark); }
    button:disabled { opacity: .55; }
    .status {
      padding: 12px;
      border-radius: 8px;
      background: #f1f7fc;
      color: var(--primary-dark);
      margin-bottom: 12px;
      font-size: 14px;
      line-height: 1.5;
    }
    .status.done { background: #ecfdf3; color: var(--ok); }
    .status.error { background: #fef3f2; color: var(--danger); }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .metric { border: 1px solid #edf0f5; border-radius: 8px; padding: 10px; background: #fff; min-width: 0; }
    .metric span { display: block; color: var(--muted); font-size: 12px; }
    .metric strong { display: block; margin-top: 4px; font-size: 15px; overflow-wrap: anywhere; }
    .charts { display: grid; gap: 12px; }
    .chart-card { border: 1px solid var(--line); border-radius: 8px; background: #fff; overflow: hidden; }
    .chart-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid #edf0f5;
    }
    .chart-title { font-weight: 700; font-size: 14px; }
    .chart-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .chart-actions a { min-height: 34px; font-size: 13px; padding: 0 10px; }
    .chart-image {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
      border-top: 1px solid #edf0f5;
    }
    .plot-stage {
      position: fixed;
      left: -10000px;
      top: 0;
      width: 1200px;
      height: 720px;
      pointer-events: none;
      opacity: 0;
    }
    pre {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      max-height: 220px;
      overflow: auto;
      background: #101828;
      color: #eef4ff;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      line-height: 1.55;
    }
    .empty {
      border: 1px dashed var(--line);
      background: #fbfcfe;
      color: var(--muted);
      border-radius: 8px;
      padding: 18px;
      text-align: center;
    }
    .hint { color: var(--muted); font-size: 13px; line-height: 1.55; margin: 12px 0 0; }
    @media (max-width: 820px) {
      .wrap { padding: 12px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .badge { text-align: left; }
      .layout { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: 1fr 1fr; }
      section { box-shadow: none; }
    }
    @media (max-width: 420px) {
      .metrics { grid-template-columns: 1fr; }
      .chart-head { align-items: flex-start; flex-direction: column; }
      .chart-actions { width: 100%; }
      .chart-actions a { flex: 1; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <h1>日志分析助手 Mobile</h1>
      <div class="badge">本地解析，不上传服务器 · 静态图片版 v3</div>
    </div>
  </header>

  <main class="wrap">
    <div class="layout">
      <section>
        <div class="panel">
          <h2>选择日志</h2>
          <form id="form">
            <label for="file">.log 文件</label>
            <input id="file" type="file" accept=".log,.bin,.dat,*/*" required>
            <label class="check"><input id="implantFilter" type="checkbox" checked><span>按植入日期过滤</span></label>
            <label class="check"><input id="nameTimeFilter" type="checkbox" checked><span>按文件名时间前后 45 天过滤</span></label>
            <label class="check"><input id="includeRawCsv" type="checkbox"><span>同时导出全量 CSV</span></label>
            <div class="actions">
              <button id="analyzeBtn" type="submit">解析并生成图表</button>
              <button id="resetBtn" type="button" class="secondary">清空结果</button>
            </div>
          </form>
          <p class="hint">适合直接托管到静态网站、对象存储、GitHub Pages，用户手机浏览器打开即可使用。</p>
        </div>
      </section>

      <section>
        <div class="panel">
          <h2>结果</h2>
          <div id="status" class="status">等待选择日志文件</div>
          <div id="summary"></div>
          <div id="downloads" class="actions"></div>
          <div id="charts" class="charts empty">解析完成后会显示图表。</div>
          <h2 style="margin-top:16px">运行日志</h2>
          <pre id="logs">暂无日志</pre>
        </div>
      </section>
    </div>
  </main>

  <script>
    const FIELDS = [
      "时间", "磁浮电机状态", "目标转速", "实时转速", "温度1", "温度2", "血泵电压",
      "磁浮异常计数", "电机异常计数", "传感器X", "传感器Y", "磁浮偏置X", "磁浮偏置Y",
      "流量", "异常状态", "血泵输出电压", "血泵输出电流", "电池1电压", "电池1电量",
      "电池2电压", "电池2电量", "控制器系统电压", "控制器系统电流", "电源选择",
      "高功率阈值", "低流量阈值", "系统功耗", "血泵功耗"
    ];

    const ERROR_BITS = {
      0: "电源未连接",
      1: "血泵初始化错误",
      2: "血泵未连接",
      3: "血泵停止工作",
      4: "控制器故障",
      5: "仅适配器供电",
      6: "电池电量极低",
      7: "功率过高",
      8: "流量过低",
      9: "电池电量低",
      10: "只有一个电池",
      11: "存储空间不足"
    };

    const state = {
      fileName: "",
      patientInfo: {},
      rawRecords: [],
      records: [],
      csvName: "records.csv",
      logs: [],
      urls: [],
      imageFiles: []
    };

    const $ = (id) => document.getElementById(id);

    function log(message) {
      const time = new Date().toLocaleTimeString("zh-CN", { hour12: false });
      state.logs.push(`[${time}] ${message}`);
      $("logs").textContent = state.logs.join("\n");
    }

    function setStatus(text, type = "") {
      $("status").className = `status ${type}`;
      $("status").textContent = text;
    }

    function pad2(n) { return String(n).padStart(2, "0"); }
    function formatDateTime(d) {
      return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
    }
    function dateOnlyKey(d) {
      return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
    }
    function signed16(v) { return v > 32768 ? v - 65536 : v; }
    function readI16BE(bytes, offset) {
      const v = (bytes[offset] << 8) + bytes[offset + 1];
      return v & 0x8000 ? v - 0x10000 : v;
    }
    function readU16BE(bytes, offset) { return (bytes[offset] << 8) + bytes[offset + 1]; }

    function decodeGbk(bytes) {
      const compact = bytes.filter((b) => b !== 0);
      try {
        return new TextDecoder("gbk").decode(new Uint8Array(compact)).trim();
      } catch {
        return new TextDecoder("utf-8").decode(new Uint8Array(compact)).trim();
      }
    }

    function validDateParts(year, month, day, hour, minute) {
      if (year < 2000 || year > 2030 || month < 1 || month > 12 || day < 1 || day > 31 || hour < 0 || hour > 23 || minute < 0 || minute > 59) return null;
      const d = new Date(year, month - 1, day, hour, minute, 0, 0);
      if (d.getFullYear() !== year || d.getMonth() !== month - 1 || d.getDate() !== day || d.getHours() !== hour || d.getMinutes() !== minute) return null;
      return d;
    }

    function getErrorStatusText(code) {
      const active = [];
      for (let bit = 0; bit <= 11; bit++) {
        if ((code & (1 << bit)) !== 0) active.push(ERROR_BITS[bit]);
      }
      return active.length ? active.join("/") : "正常工作";
    }

    function parsePatientInfo(bytes) {
      if (bytes.length < 80) return {};
      let bcc = 0;
      let isEmpty = true;
      for (let i = 1; i < 80; i++) {
        bcc ^= bytes[i];
        if (bytes[i] !== 0 && bytes[i] !== 255) isEmpty = false;
      }
      if (bcc !== bytes[0] || isEmpty) return {};
      const year = bytes[3] + 2000;
      const month = bytes[4];
      const day = bytes[5];
      return {
        "植入日期": `${year}-${pad2(month)}-${pad2(day)}`,
        "姓名": decodeGbk(Array.from(bytes.slice(10, 42))) || "未设置",
        "编号": decodeGbk(Array.from(bytes.slice(42, 74))) || "未设置",
        "高功率阈值": `${(readU16BE(bytes, 74) / 100).toFixed(2)}W`,
        "低流量阈值": `${(readU16BE(bytes, 76) / 100).toFixed(2)}L/MIN`,
        "目标转速": `${readU16BE(bytes, 78)}RPM`
      };
    }

    function getImplantDate(bytes) {
      if (bytes.length < 80) return null;
      let bcc = 0;
      let isEmpty = true;
      for (let i = 1; i < 80; i++) {
        bcc ^= bytes[i];
        if (bytes[i] !== 0 && bytes[i] !== 255) isEmpty = false;
      }
      if (bcc !== bytes[0] || isEmpty) return null;
      return validDateParts(bytes[3] + 2000, bytes[4], bytes[5], 0, 0);
    }

    function findPatientIdPosition(bytes) {
      const info = parsePatientInfo(bytes);
      return info["编号"] ? 42 : null;
    }

    function validateDataPosition(bytes, startPos) {
      let valid = 0;
      for (let i = 0; i < 10; i++) {
        const pos = startPos + i * 50;
        if (pos + 50 > bytes.length) continue;
        const year = bytes[pos + 1] + 2000;
        const d = validDateParts(year, bytes[pos + 2], bytes[pos + 3], bytes[pos + 4], bytes[pos + 5]);
        if (d) valid += 1;
      }
      return valid >= 8;
    }

    function findDataStartPosition(bytes) {
      const patientPos = findPatientIdPosition(bytes);
      if (patientPos !== null) {
        const estimated = patientPos + 966;
        log(`基于患者编号位置 ${patientPos} 估算数据起始位置: ${estimated}`);
        if (estimated < bytes.length && validateDataPosition(bytes, estimated)) {
          log(`数据起始位置验证成功: ${estimated}`);
          return estimated;
        }
      }

      const deviceIds = ["CT0061", "CHB0052", "CT0062", "CHB0053"].map((s) => Array.from(s).map((c) => c.charCodeAt(0)));
      for (const id of deviceIds) {
        for (let i = 0; i < bytes.length - id.length; i++) {
          let ok = true;
          for (let j = 0; j < id.length; j++) {
            if (bytes[i + j] !== id[j]) { ok = false; break; }
          }
          if (ok) {
            const estimated = i + 1000;
            log(`找到设备 ID，估算数据起始位置: ${estimated}`);
            if (estimated < bytes.length && validateDataPosition(bytes, estimated)) return estimated;
          }
        }
      }

      for (let start = 0; start < Math.min(5000, bytes.length); start += 50) {
        if (validateDataPosition(bytes, start)) {
          log(`扫描找到有效数据起始位置: ${start}`);
          return start;
        }
      }
      log("使用默认数据起始位置 1040");
      return 1040;
    }

    function parseHistory(bytes, applyImplantFilter) {
      const records = [];
      const preferredStart = 0x410;
      const detectedStart = findDataStartPosition(bytes);
      const startIndex = detectedStart >= preferredStart ? detectedStart : preferredStart;
      const endIndex = Math.min(bytes.length, 0x36BF0);
      const implantDate = applyImplantFilter ? getImplantDate(bytes) : null;
      if (implantDate) log(`植入日期界限: ${dateOnlyKey(implantDate)}`);
      log(`历史数据解析区间: 起始 0x${startIndex.toString(16)} 结束 0x${endIndex.toString(16)}`);

      let total = 0, empty = 0, checksumFail = 0;
      for (let idx = startIndex; idx < endIndex; idx += 50) {
        if (idx + 50 > bytes.length) break;
        total += 1;
        let bcc = 0;
        let isEmpty = true;
        for (let i = idx + 1; i < idx + 50; i++) {
          bcc ^= bytes[i];
          if (bytes[i] !== 255) isEmpty = false;
        }
        if (isEmpty) { empty += 1; continue; }
        if (bcc !== bytes[idx]) { checksumFail += 1; continue; }

        const year = bytes[idx + 1] + 2000;
        const d = validDateParts(year, bytes[idx + 2], bytes[idx + 3], bytes[idx + 4], bytes[idx + 5]);
        if (!d) continue;
        if (implantDate && new Date(d.getFullYear(), d.getMonth(), d.getDate()) < implantDate) continue;

        const sensorX = signed16(readU16BE(bytes, idx + 17));
        const sensorY = signed16(readU16BE(bytes, idx + 19));
        const offsetX = signed16(readU16BE(bytes, idx + 21));
        const offsetY = signed16(readU16BE(bytes, idx + 23));
        const exceptionCode = readU16BE(bytes, idx + 27);
        const bloodPumpVoltage = readU16BE(bytes, idx + 29);
        const bloodPumpCurrent = readU16BE(bytes, idx + 31);
        const systemVoltage = readU16BE(bytes, idx + 41);
        const systemCurrent = readU16BE(bytes, idx + 43);

        records.push({
          "时间": formatDateTime(d),
          "磁浮电机状态": bytes[idx + 6],
          "目标转速": readU16BE(bytes, idx + 7),
          "实时转速": readU16BE(bytes, idx + 9),
          "温度1": new Int8Array([bytes[idx + 11]])[0],
          "温度2": new Int8Array([bytes[idx + 12]])[0],
          "血泵电压": readU16BE(bytes, idx + 13),
          "磁浮异常计数": bytes[idx + 15],
          "电机异常计数": bytes[idx + 16],
          "传感器X": sensorX,
          "传感器Y": sensorY,
          "磁浮偏置X": offsetX,
          "磁浮偏置Y": offsetY,
          "流量": readI16BE(bytes, idx + 25) / 100,
          "异常状态": getErrorStatusText(exceptionCode),
          "血泵输出电压": bloodPumpVoltage,
          "血泵输出电流": bloodPumpCurrent,
          "电池1电压": readU16BE(bytes, idx + 33),
          "电池1电量": readU16BE(bytes, idx + 35),
          "电池2电压": readU16BE(bytes, idx + 37),
          "电池2电量": readU16BE(bytes, idx + 39),
          "控制器系统电压": systemVoltage,
          "控制器系统电流": systemCurrent,
          "电源选择": bytes[idx + 45],
          "高功率阈值": readU16BE(bytes, idx + 46) / 100,
          "低流量阈值": readU16BE(bytes, idx + 48) / 100,
          "系统功耗": Math.round(systemVoltage * systemCurrent / 100000) / 10,
          "血泵功耗": Math.round(bloodPumpVoltage * bloodPumpCurrent / 100000) / 10
        });
      }
      records.sort((a, b) => a["时间"].localeCompare(b["时间"]));
      log(`帧校验结果: 总帧 ${total} | 有效 ${records.length} | 空帧 ${empty} | 校验失败 ${checksumFail}`);
      return records;
    }

    function tryDate(y, m, d, h, mi, s = 0) {
      const dt = new Date(y, m - 1, d, h, mi, s);
      if (dt.getFullYear() === y && dt.getMonth() === m - 1 && dt.getDate() === d && dt.getHours() === h && dt.getMinutes() === mi && dt.getSeconds() === s) return dt;
      return null;
    }

    function parseFilenameTime(filename) {
      const name = filename.replace(/\.[^.]+$/, "");
      const patterns = [
        [/(\d{4})[-/](\d{2})[-/](\d{2})_(\d{2})-(\d{2})/, 5],
        [/(\d{4})[-/]?(\d{2})[-/]?(\d{2})_(\d{2})(\d{2})(\d{2})/, 6],
        [/(\d{4})[-/]?(\d{2})[-/]?(\d{2})_(\d{2})(\d{2})(?:\D|$)/, 5],
        [/(\d{4})[-/](\d{2})[-/](\d{2})_(\d{2})-(\d{2})-(\d{2})/, 6]
      ];
      for (const [re, fields] of patterns) {
        const m = name.match(re);
        if (!m) continue;
        const v = m.slice(1, fields + 1).map(Number);
        const dt = fields === 5 ? tryDate(v[0], v[1], v[2], v[3], v[4]) : tryDate(v[0], v[1], v[2], v[3], v[4], v[5]);
        if (dt) return dt;
      }
      const candidates = [];
      const m14 = name.match(/(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})(?:\D|$)/);
      if (m14) {
        const v = m14.slice(1).map(Number);
        const dt = tryDate(v[0], v[1], v[2], v[3], v[4], v[5]);
        if (dt) candidates.push(dt);
      }
      for (const m of name.matchAll(/(20\d{2})(\d{5,10})/g)) {
        const year = Number(m[1]);
        const rest = m[2];
        function split(s, parts) {
          if (!s) {
            if (parts.length >= 4) {
              const dt = tryDate(year, parts[0], parts[1], parts[2], parts[3], parts[4] || 0);
              if (dt) candidates.push(dt);
            }
            return;
          }
          if (parts.length >= 5) return;
          split(s.slice(1), parts.concat(Number(s.slice(0, 1))));
          if (s.length >= 2) split(s.slice(2), parts.concat(Number(s.slice(0, 2))));
        }
        split(rest, []);
      }
      candidates.sort((a, b) => b - a);
      return candidates[0] || null;
    }

    function applyAnalysisFilters(records, filename, useNameTime) {
      let out = records.filter((r) => r["时间"] <= "2026-12-15 23:59");
      if (!useNameTime) return out;
      const ref = parseFilenameTime(filename);
      if (!ref) {
        log("无法从文件名识别时间，跳过前后 45 天筛选");
        return out;
      }
      const start = new Date(ref.getTime() - 45 * 86400000);
      const end = new Date(ref.getTime() + 45 * 86400000);
      log(`文件名识别时间: ${formatDateTime(ref)}，筛选范围: ${formatDateTime(start)} 至 ${formatDateTime(end)}`);
      out = out.filter((r) => {
        const d = new Date(r["时间"].replace(" ", "T"));
        return d >= start && d <= end;
      });
      return out;
    }

    function sanitizeName(s) {
      return (s || "未设置").replace(/[\\/:*?"<>|]/g, "").trim() || "未设置";
    }

    function buildCsvName(patientInfo, filename) {
      const patientId = sanitizeName(patientInfo["编号"] || "未知编号");
      const dt = parseFilenameTime(filename);
      if (dt) return `${patientId}_${dt.getFullYear()}-${pad2(dt.getMonth() + 1)}-${pad2(dt.getDate())}_${pad2(dt.getHours())}-${pad2(dt.getMinutes())}.csv`;
      return `${filename.replace(/\.[^.]+$/, "")}.csv`;
    }

    function csvEscape(value) {
      const s = value === null || value === undefined ? "" : String(value);
      return /[",\r\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    }

    function toCsv(records) {
      const lines = [FIELDS.join(",")];
      for (const r of records) lines.push(FIELDS.map((f) => csvEscape(r[f])).join(","));
      return "\ufeff" + lines.join("\r\n");
    }

    function makeDownload(name, content, type) {
      const blob = content instanceof Blob ? content : new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      state.urls.push(url);
      return url;
    }

    function renderSummary() {
      const info = state.patientInfo;
      const records = state.records;
      const first = records[0]?.["时间"] || "-";
      const last = records[records.length - 1]?.["时间"] || "-";
      $("summary").innerHTML = `
        <div class="metrics">
          <div class="metric"><span>患者编号</span><strong>${info["编号"] || "-"}</strong></div>
          <div class="metric"><span>记录数</span><strong>${records.length}</strong></div>
          <div class="metric"><span>开始时间</span><strong>${first}</strong></div>
          <div class="metric"><span>结束时间</span><strong>${last}</strong></div>
        </div>
      `;
    }

    function renderDownloads() {
      const csvUrl = makeDownload(state.csvName, toCsv(state.records), "text/csv;charset=utf-8");
      const links = [
        `<a class="download-link" href="${csvUrl}" download="${state.csvName}">下载 CSV</a>`,
        `<button id="downloadAllImages" type="button" class="secondary">逐个下载全部图片</button>`
      ];
      if ($("includeRawCsv").checked && state.rawRecords.length !== state.records.length) {
        const rawName = state.csvName.replace(/\.csv$/i, "_全量.csv");
        const rawUrl = makeDownload(rawName, toCsv(state.rawRecords), "text/csv;charset=utf-8");
        links.splice(1, 0, `<a class="download-link secondary" href="${rawUrl}" download="${rawName}">下载全量 CSV</a>`);
      }
      $("downloads").innerHTML = links.join("");
      $("downloadAllImages").addEventListener("click", downloadAllImages);
    }

    function col(records, name) {
      return records.map((r) => {
        const n = Number(r[name]);
        return Number.isFinite(n) ? n : null;
      });
    }

    function times(records) { return records.map((r) => r["时间"]); }

    function dailyAverage(records, field) {
      const groups = new Map();
      for (const r of records) {
        const day = r["时间"].slice(0, 10);
        const v = Number(r[field]);
        if (!Number.isFinite(v)) continue;
        if (!groups.has(day)) groups.set(day, []);
        groups.get(day).push(v);
      }
      const x = [], y = [];
      for (const [day, values] of groups) {
        x.push(day);
        y.push(values.reduce((a, b) => a + b, 0) / values.length);
      }
      return { x, y };
    }

    function dailyGroups(records, field) {
      const groups = new Map();
      for (const r of records) {
        const day = r["时间"].slice(5, 10);
        const v = Number(r[field]);
        if (!Number.isFinite(v)) continue;
        if (!groups.has(day)) groups.set(day, []);
        groups.get(day).push(v);
      }
      return Array.from(groups, ([day, values]) => ({ day, values }));
    }

    function flowThresholdSuggestion(records) {
      const normalRecords = records.filter((r) => r["异常状态"] === "正常工作");
      const source = normalRecords.length ? normalRecords : records;
      const groups = new Map();

      for (const r of source) {
        const day = r["时间"].slice(0, 10);
        const flow = Number(r["流量"]);
        const currentThreshold = Number(r["低流量阈值"]);
        if (!Number.isFinite(flow)) continue;
        if (!groups.has(day)) groups.set(day, { flows: [], thresholds: [] });
        groups.get(day).flows.push(flow);
        if (Number.isFinite(currentThreshold)) groups.get(day).thresholds.push(currentThreshold);
      }

      const days = Array.from(groups.keys()).sort();
      const dailyMin = days.map((day) => Math.min(...groups.get(day).flows));
      const currentThreshold = days.map((day) => {
        const values = groups.get(day).thresholds;
        return values.length ? values[values.length - 1] : null;
      });
      const traces = [
        {
          x: days,
          y: dailyMin,
          name: "每日最低流量",
          type: "scatter",
          mode: "lines+markers",
          line: { color: "#1769aa" },
          marker: { size: 8 }
        },
        {
          x: days,
          y: currentThreshold,
          name: "当前低流量阈值",
          type: "scatter",
          mode: "lines",
          line: { color: "#d92d20", dash: "dash" }
        }
      ];

      for (const period of [3, 5, 7, 14, 21]) {
        const y = dailyMin.map((_, idx) => {
          if (idx + 1 < period) return null;
          const recent = dailyMin.slice(idx + 1 - period, idx + 1);
          return recent.reduce((a, b) => a + b, 0) / recent.length * 0.6;
        });
        if (y.some((value) => value !== null)) {
          traces.push({
            x: days,
            y,
            name: `近${period}天建议阈值`,
            type: "scatter",
            mode: "lines+markers",
            line: { dash: "dot" }
          });
        }
      }

      const note = days.length < 3
        ? "数据不足 3 天时，仅展示每日最低流量和当前阈值；建议阈值从第 3 天开始计算。"
        : "";
      return { traces, note };
    }

    function chartSpecs(records) {
      const x = times(records);
      const amplitude = records.map((r) => {
        const sx = Number(r["传感器X"]), sy = Number(r["传感器Y"]), ox = Number(r["磁浮偏置X"]), oy = Number(r["磁浮偏置Y"]);
        return Math.sqrt((sx - ox) ** 2 + (sy - oy) ** 2);
      });
      const daily = dailyAverage(records, "流量");
      const boxes = dailyGroups(records, "流量");
      const thresholdSuggestion = flowThresholdSuggestion(records);
      return [
        { id: "flow", title: "模拟流量图", traces: [
          { x, y: col(records, "流量"), name: "流量", type: "scatter", mode: "lines", line: { color: "#1769aa" } },
          { x, y: col(records, "低流量阈值"), name: "低流量阈值", type: "scatter", mode: "lines", line: { color: "#d92d20" } }
        ], yTitle: "L/MIN" },
        { id: "speed", title: "转速图", traces: [
          { x, y: col(records, "实时转速"), name: "实时转速", type: "scatter", mode: "lines", line: { color: "#d92d20" } },
          { x, y: col(records, "目标转速"), name: "目标转速", type: "scatter", mode: "lines", line: { color: "#16a34a" } }
        ], yTitle: "RPM" },
        { id: "power", title: "功耗图", traces: [
          { x, y: col(records, "系统功耗"), name: "系统功耗", type: "scatter", mode: "lines", line: { color: "#9333ea" } },
          { x, y: col(records, "血泵功耗"), name: "血泵功耗", type: "scatter", mode: "lines", line: { color: "#0891b2" } },
          { x, y: col(records, "高功率阈值"), name: "高功率阈值", type: "scatter", mode: "lines", line: { color: "#d92d20" } }
        ], yTitle: "W" },
        { id: "temperature", title: "温度图", traces: [
          { x, y: col(records, "温度1"), name: "温度1", type: "scatter", mode: "lines", line: { color: "#9333ea" } },
          { x, y: col(records, "温度2"), name: "温度2", type: "scatter", mode: "lines", line: { color: "#0891b2" } }
        ], yTitle: "温度" },
        { id: "voltage", title: "电压图", traces: [
          { x, y: col(records, "血泵电压"), name: "血泵电压", type: "scatter", mode: "lines", line: { color: "#9333ea" } },
          { x, y: col(records, "血泵输出电压"), name: "血泵输出电压", type: "scatter", mode: "lines", line: { color: "#0891b2" } }
        ], yTitle: "电压" },
        { id: "sensor", title: "传感器位置", traces: [
          { x, y: col(records, "传感器X"), name: "传感器X", type: "scatter", mode: "lines", line: { color: "#9333ea" } },
          { x, y: col(records, "传感器Y"), name: "传感器Y", type: "scatter", mode: "lines", line: { color: "#0891b2" } }
        ], yTitle: "位置" },
        { id: "offset", title: "磁浮偏置位置", traces: [
          { x, y: col(records, "磁浮偏置X"), name: "磁浮偏置X", type: "scatter", mode: "lines", line: { color: "#6f42c1" } },
          { x, y: col(records, "磁浮偏置Y"), name: "磁浮偏置Y", type: "scatter", mode: "lines", line: { color: "#28a745" } }
        ], yTitle: "位置" },
        { id: "amplitude", title: "偏置幅值图", traces: [
          { x, y: amplitude, name: "偏置幅值", type: "scatter", mode: "lines", line: { color: "#7c3aed" } }
        ], yTitle: "幅值" },
        { id: "offset-scatter", title: "磁浮偏置坐标图", traces: [
          { x: col(records, "磁浮偏置X"), y: col(records, "磁浮偏置Y"), name: "偏置点", type: "scatter", mode: "markers", marker: { color: "#1769aa", size: 4, opacity: 0.5 } }
        ], yTitle: "Y", xTitle: "X", square: true, tall: true },
        { id: "daily-flow", title: "每日平均模拟流量图", traces: [
          { x: daily.x, y: daily.y, name: "每日平均流量", type: "scatter", mode: "lines+markers", line: { color: "#f97316" }, text: daily.y.map((v) => v.toFixed(1)), textposition: "top center" }
        ], yTitle: "L/MIN" },
        { id: "flow-threshold-suggestion", title: "流量阈值建议图", traces: thresholdSuggestion.traces, yTitle: "L/MIN", note: thresholdSuggestion.note },
        { id: "daily-box", title: "每日模拟流量箱型图", traces: boxes.map((g) => ({ y: g.values, name: g.day, type: "box", marker: { color: "#1769aa" } })), yTitle: "L/MIN", box: true, tall: true },
        { id: "four-in-one", title: "四合一图", traces: [
          { x, y: col(records, "流量"), name: "流量", type: "scatter", mode: "lines", xaxis: "x", yaxis: "y", line: { color: "#1769aa" } },
          { x, y: col(records, "实时转速"), name: "实时转速", type: "scatter", mode: "lines", xaxis: "x2", yaxis: "y2", line: { color: "#d92d20" } },
          { x, y: col(records, "系统功耗"), name: "系统功耗", type: "scatter", mode: "lines", xaxis: "x3", yaxis: "y3", line: { color: "#9333ea" } },
          { x, y: col(records, "磁浮偏置X"), name: "偏置X", type: "scatter", mode: "lines", xaxis: "x4", yaxis: "y4", line: { color: "#16a34a" } }
        ], multi: true, tall: true }
      ];
    }

    function baseLayout(spec) {
      if (spec.multi) {
        return {
          margin: { t: 30, r: 30, b: 42, l: 54 },
          xaxis: { type: "date", anchor: "y", domain: [0, 1], tickangle: -45 },
          yaxis: { title: "流量", domain: [0.78, 1] },
          xaxis2: { type: "date", anchor: "y2", domain: [0, 1], tickangle: -45 },
          yaxis2: { title: "转速", domain: [0.52, 0.74] },
          xaxis3: { type: "date", anchor: "y3", domain: [0, 1], tickangle: -45 },
          yaxis3: { title: "功耗", domain: [0.26, 0.48] },
          xaxis4: { type: "date", anchor: "y4", domain: [0, 1], tickangle: -45 },
          yaxis4: { title: "偏置X", domain: [0, 0.22] },
          legend: { orientation: "h" }
        };
      }
      const layout = {
        margin: { t: 30, r: 18, b: 46, l: 54 },
        xaxis: { title: spec.xTitle || "时间", type: spec.square || spec.box ? undefined : "date", tickangle: -45, showgrid: true, gridcolor: "#edf0f5" },
        yaxis: { title: spec.yTitle || "", showgrid: true, gridcolor: "#edf0f5" },
        legend: { orientation: "h" },
        paper_bgcolor: "#fff",
        plot_bgcolor: "#fff"
      };
      if (spec.square) {
        layout.xaxis.range = [-600, 600];
        layout.yaxis.range = [-600, 600];
        layout.yaxis.scaleanchor = "x";
        layout.yaxis.scaleratio = 1;
      }
      return layout;
    }

    async function renderCharts() {
      const container = $("charts");
      container.className = "charts";
      container.innerHTML = "";
      state.imageFiles = [];
      const specs = chartSpecs(state.records);
      for (const spec of specs) {
        const image = await createChartImage(spec);
        state.imageFiles.push({ id: spec.id, title: spec.title, url: image.url, filename: image.filename });
        const card = document.createElement("div");
        card.className = "chart-card";
        card.innerHTML = `
          <div class="chart-head">
            <div class="chart-title">${spec.title}</div>
            <div class="chart-actions">
              <a class="download-link secondary" href="${image.url}" download="${image.filename}">下载图片</a>
            </div>
          </div>
          ${spec.note ? `<div class="hint" style="padding:0 12px 10px;margin:0;">${spec.note}</div>` : ""}
          <img class="chart-image" src="${image.url}" alt="${spec.title}">
        `;
        container.appendChild(card);
      }
    }

    async function createChartImage(spec) {
      const width = 1200;
      const height = spec.tall ? 900 : 720;
      const stage = document.createElement("div");
      stage.className = "plot-stage";
      stage.style.width = `${width}px`;
      stage.style.height = `${height}px`;
      document.body.appendChild(stage);
      await Plotly.newPlot(stage, spec.traces, baseLayout(spec), { staticPlot: true, displayModeBar: false, responsive: false });
      const dataUrl = await Plotly.toImage(stage, { format: "png", width, height, scale: 1 });
      Plotly.purge(stage);
      stage.remove();
      const blob = dataUrlToBlob(dataUrl);
      const filename = `${sanitizeName(state.patientInfo["编号"] || "log")}_${spec.title}.png`;
      const url = makeDownload(filename, blob, "image/png");
      return { url, filename };
    }

    function dataUrlToBlob(dataUrl) {
      const parts = dataUrl.split(",");
      const mime = parts[0].match(/:(.*?);/)[1];
      const binary = atob(parts[1]);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return new Blob([bytes], { type: mime });
    }

    async function downloadAllImages() {
      for (const image of state.imageFiles) {
        const link = document.createElement("a");
        link.href = image.url;
        link.download = image.filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        await new Promise((resolve) => setTimeout(resolve, 900));
      }
    }

    function cleanupUrls() {
      for (const url of state.urls) URL.revokeObjectURL(url);
      state.urls = [];
      state.imageFiles = [];
    }

    async function analyze(file) {
      cleanupUrls();
      state.fileName = file.name;
      state.logs = [];
      $("logs").textContent = "";
      $("downloads").innerHTML = "";
      $("summary").innerHTML = "";
      $("charts").className = "charts empty";
      $("charts").textContent = "正在解析...";
      setStatus("正在读取文件...");
      const bytes = new Uint8Array(await file.arrayBuffer());
      log(`读取文件: ${file.name} (${bytes.length} 字节)`);
      state.patientInfo = parsePatientInfo(bytes);
      if (state.patientInfo["编号"]) log(`患者编号: ${state.patientInfo["编号"]}`);
      state.rawRecords = parseHistory(bytes, $("implantFilter").checked);
      if (!state.rawRecords.length) throw new Error("未找到有效历史数据");
      state.records = applyAnalysisFilters(state.rawRecords, file.name, $("nameTimeFilter").checked);
      if (!state.records.length) throw new Error("筛选后没有数据，请关闭文件名时间过滤后重试");
      state.csvName = buildCsvName(state.patientInfo, file.name);
      log(`筛选前记录数: ${state.rawRecords.length}，筛选后记录数: ${state.records.length}`);
      renderSummary();
      renderDownloads();
      await renderCharts();
      setStatus("解析完成。CSV 和图片均在手机本地生成，未上传服务器。", "done");
    }

    $("form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const file = $("file").files[0];
      if (!file) return;
      $("analyzeBtn").disabled = true;
      try {
        await analyze(file);
      } catch (err) {
        console.error(err);
        setStatus(`失败：${err.message}`, "error");
        $("charts").className = "charts empty";
        $("charts").textContent = "没有可显示的图表。";
        log(`错误: ${err.stack || err.message}`);
      } finally {
        $("analyzeBtn").disabled = false;
      }
    });

    $("resetBtn").addEventListener("click", () => {
      cleanupUrls();
      state.fileName = "";
      state.patientInfo = {};
      state.rawRecords = [];
      state.records = [];
      state.logs = [];
      $("file").value = "";
      $("summary").innerHTML = "";
      $("downloads").innerHTML = "";
      $("charts").className = "charts empty";
      $("charts").textContent = "解析完成后会显示图表。";
      $("logs").textContent = "暂无日志";
      setStatus("等待选择日志文件");
    });

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      navigator.serviceWorker.register("sw.js?v=3").catch(() => {});
    }
  </script>
</body>
</html>
